
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:latest
        container_name: mssql
        environment:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "!StrongPassw0rd"
          MSSQL_PID: "Developer"
        ports:
          - "1433:1433"
        volumes:
          - mssql_data:/var/opt/mssql
        restart: unless-stopped

    volumes:
      mssql_data:


